proxies:
  provider: proxyrack
  api_key: ""
  country: "US"

discord:
  bot_token: ""
  channel_id: ""

telegram:
  bot_token: ""
  chat_id: ""

selenium:
  # Hypothesis testing:
  # - headless: false  -> closer to devtools/browser behavior
  # - disable_automation_flags: true -> reduce easy webdriver fingerprinting
  headless: false
  disable_automation_flags: true
  user_agent: ""

profiles:
  headed-default:
    label: headed-default
    selenium:
      headless: false
      disable_automation_flags: true
      user_agent: ""
  headless-default:
    label: headless-default
    selenium:
      headless: true
      disable_automation_flags: true
      user_agent: ""
  headless-custom-ua:
    label: headless-custom-ua
    selenium:
      headless: true
      disable_automation_flags: true
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36"

# 本番は .env の US_AMEX_OFFER_HUNTER_CONFIG__URLS で上書き
urls:
  - "https://example.com"

targets:
  - 300000
  - 200000

